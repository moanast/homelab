- name: if configuration file exists
  file:
    path: /opt/homeassistant/config
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: copy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: /opt/homeassistant/docker-compose.yml
    mode: '0644'

- name: turn on HA
  community.docker.docker_compose_v2:
    project_src: /opt/homeassistant
    state: present
    pull: always
