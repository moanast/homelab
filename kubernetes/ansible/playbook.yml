---
- name: Prepare Raspberry Pi Nodes for K3s Cluster
  hosts: all
  become: yes
  vars:
    k3s_version: "v1.30.2+k3s1"

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  tasks:
    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove swap from /etc/fstab permanently
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Load required kernel modules for containerd
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Ensure kernel modules load on boot
      copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          overlay
          br_netfilter

    - name: Set sysctl parameters for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }


- name: Deploy K3s Control Plane (Master)
  hosts: master
  become: yes
  tasks:
    - name: Install K3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3s_VERSION="{{ k3s_version }}" sh -s -           --write-kubeconfig-mode 644           --disable servicelb           --disable traefik
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for node token to be created
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Read node-token from master
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Set fact for token
      set_fact:
        k3s_token: "{{ k3s_token_raw['content'] | b64decode | trim }}"

    - name: Fetch kubeconfig from master to control machine
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ./kubeconfig
        flat: yes


- name: Deploy K3s Worker Nodes (Agents)
  hosts: workers
  become: yes
  tasks:
    - name: Join K3s worker to cluster
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3s_VERSION="{{ hostvars[groups['master'][0]]['k3s_version'] }}"           K3S_URL=https://{{ hostvars[groups['master'][0]]['ansible_host'] }}:6443           K3S_TOKEN="{{ hostvars[groups['master'][0]]['k3s_token'] }}"           sh -
      args:
        creates: /usr/local/bin/k3s
